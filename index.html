<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contagem.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <title>Contagens</title>
</head>

<body>
    <div class="container">
        <h1>Contagens</h1>

        <form>
            <input type="text" id="inProduto" placeholder="Produto" required>
            <input type="number" id="inValor" placeholder="Valor" step="0.01" required>
            <button type="submit">Adicionar</button>
        </form>

        <button id="btLimpar" type="button">Zerar lista</button>

        <ul id="lista"></ul>
    </div>

    <script src="contagens.js"></script>
</body>

</html>
